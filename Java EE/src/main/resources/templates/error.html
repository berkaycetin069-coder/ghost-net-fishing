<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fehler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container page-shell">
        <a class="navbar-brand" th:href="@{/}">Ghost Net Fishing</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Startseite</a>
            <a class="nav-link" th:href="@{/report}">Netz melden</a>
            <a class="nav-link" th:href="@{/open-nets}">Offene Netze</a>
            <a class="nav-link" th:href="@{/h2-console}">Entwicklung: H2-Konsole</a>
        </div>
    </div>
</nav>

<main class="container page-shell py-4">
    <section class="form-section p-4">
        <h1 class="h3" th:text="${errorTitle != null ? errorTitle : 'Fehler'}">Fehler</h1>
        <p class="text-secondary" th:text="${errorMessage != null ? errorMessage : 'Die Anfrage konnte nicht verarbeitet werden.'}">
            Die Anfrage konnte nicht verarbeitet werden.
        </p>
        <a class="btn btn-primary" th:href="@{/open-nets}">Zurück zur Übersicht</a>
    </section>
</main>
</body>
</html>
